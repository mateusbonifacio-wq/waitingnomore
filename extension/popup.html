<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Keel</title>
    <style>
      :root {
        color-scheme: dark;
        --text: #f4f4f5;
        --muted: #a1a1aa;
        --bg: #0c0c0f;
      }
      body {
        margin: 0;
        padding: 16px 18px;
        min-width: 200px;
        max-width: 260px;
        font: 13px ui-sans-serif, system-ui, sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.45;
      }
      h1 {
        margin: 0 0 6px;
        font-size: 15px;
        font-weight: 600;
        letter-spacing: -0.02em;
      }
      p {
        margin: 0;
        color: var(--muted);
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <h1>Keel</h1>
    <p>Before you drift.</p>
  </body>
</html>
